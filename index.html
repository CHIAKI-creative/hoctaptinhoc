<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="icon" type="image/x-icon" href="assets/icon.ico">
        <title>HỌC TẬP TIN HỌC</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link href="styles.css" rel="stylesheet">
    </head>
    <style>
        .card-title {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 1.1rem; 
        }

        @media (max-width: 576px) {
            .card-title {
                font-size: 0.9rem !important;
            }
            .card-text {
                font-size: 0.75rem !important;
                -webkit-line-clamp: 2 !important;
            }
            .btn-sm {
                font-size: 0.7rem !important;
                padding: 2px 8px !important;
            }
        }
    </style>
    <body>
        <nav class="navbar navbar-dark bg-dark fixed-top" data-bs-theme="dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="">
                    <img src="assets/icon.png" alt="Logo" width="30" height="30" class="d-inline-block align-text-top">
                    <b>HỌC TẬP TIN HỌC</b>
                </a>
            </div>
        </nav>
        <div class="container-fluid" style="margin-top: 80px;">
            <div class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4" id="card-container"></div>
        </div>
        <footer class="bg-dark text-light text-center py-3 mt-5">
            <div class="container-fluid">
                <p class="mb-0">Được thiết kế bởi <b>NGUYỄN TẤN PHÁT</b></p>
            </div>
        </footer>
        <script>
            // 1. Danh sách dữ liệu các môn học
            const subjects = [
                {
                    title: "1. Cơ sở dữ liệu",
                    desc: "Cơ sở dữ liệu là hệ thống lưu trữ thông tin giúp quản lý dữ liệu hiệu quả.",
                    link: "html/csdl.html",
                    img: "assets/background_csdl.png"
                },
                // Các thẻ trống (Sắp ra mắt) - Bạn có thể copy dòng này để tạo thêm nhiều thẻ
                ...Array(13).fill({
                    title: "Sắp ra mắt",
                    desc: "Nội dung đang được cập nhật, vui lòng quay lại sau.",
                    link: "#",
                    img: "assets/background_comming_soon.png"
                })
            ];

            // 2. Hàm đổ dữ liệu ra HTML
            const container = document.getElementById('card-container');
            
            subjects.forEach(item => {
                const cardHtml = `
                    <div class="col">
                        <div class="card h-100 shadow-sm border-0 overflow-hidden">
                            <div class="row g-0 h-100"> 
                                <!-- Cột chứa ảnh -->
                                <div class="col-4">
                                    <img src="${item.img}" 
                                        class="img-fluid h-100" 
                                        style="object-fit: cover; min-height: 100px; width: 100%;" 
                                        alt="${item.title}">
                                </div>
                                <!-- Cột chứa nội dung -->
                                <div class="col-8">
                                    <div class="card-body d-flex flex-column h-100 p-2 p-md-3">
                                        <h5 class="card-title text-primary mb-1 fw-bold">
                                            ${item.title}
                                        </h5>
                                        <p class="card-text mb-2 text-muted text-justify">
                                            ${item.desc}
                                        </p>
                                        <div class="mt-auto d-flex justify-content-end">
                                            <a href="${item.link}" class="btn btn-secondary btn-sm shadow-sm">
                                                <i class="fas fa-sign-in me-1"></i> Vào trang
                                            </a>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHtml;
            });
        </script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </body>
</html>
